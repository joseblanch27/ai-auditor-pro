<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Auditor Pro — Acceso</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF7F2;
    --warm-white: #FFFEF9;
    --gold: #C9A84C;
    --gold-light: #E8D5A3;
    --dark: #1C1A17;
    --dark-soft: #2E2B26;
    --text: #3D3A35;
    --text-light: #7A7570;
    --accent: #B85C38;
    --accent-soft: #F0E6DF;
    --green: #3D6B4F;
    --green-soft: #E3EDE7;
    --border: #E8E2D9;
    --error: #C0392B;
    --error-soft: #FDECEA;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* NAV */
  nav {
    padding: 20px 60px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: var(--cream);
  }

  .nav-logo {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--dark);
    text-decoration: none;
    letter-spacing: -0.5px;
  }

  .nav-logo span { color: var(--gold); }

  /* MAIN */
  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 24px;
    position: relative;
    overflow: hidden;
  }

  main::before {
    content: '';
    position: absolute; top: -200px; right: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(201,168,76,0.1) 0%, transparent 70%);
    pointer-events: none;
  }

  main::after {
    content: '';
    position: absolute; bottom: -100px; left: -100px;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(184,92,56,0.07) 0%, transparent 70%);
    pointer-events: none;
  }

  .auth-card {
    background: var(--warm-white);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 52px 48px;
    width: 100%;
    max-width: 460px;
    position: relative;
    z-index: 1;
    box-shadow: 0 8px 48px rgba(28,26,23,0.06);
    animation: fadeUp 0.5s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .auth-title {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 700;
    color: var(--dark);
    letter-spacing: -1px;
    margin-bottom: 8px;
  }

  .auth-sub {
    font-size: 14px;
    color: var(--text-light);
    margin-bottom: 36px;
    line-height: 1.6;
  }

  /* TABS */
  .tabs {
    display: flex;
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 32px;
  }

  .tab {
    flex: 1;
    padding: 10px;
    text-align: center;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-light);
    cursor: pointer;
    border-radius: 7px;
    transition: all 0.2s;
    border: none;
    background: none;
  }

  .tab.active {
    background: var(--dark);
    color: var(--cream);
  }

  /* FORM */
  .form-group { margin-bottom: 20px; }

  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 8px;
    letter-spacing: 0.2px;
  }

  input[type="email"],
  input[type="password"],
  input[type="text"] {
    width: 100%;
    padding: 14px 16px;
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 15px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(201,168,76,0.12);
  }

  .btn-submit {
    width: 100%;
    background: var(--dark);
    color: var(--cream);
    padding: 16px;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    border: none;
    cursor: pointer;
    letter-spacing: 0.3px;
    transition: all 0.2s;
    margin-top: 8px;
    font-family: 'DM Sans', sans-serif;
  }

  .btn-submit:hover {
    background: var(--dark-soft);
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(28,26,23,0.15);
  }

  .btn-submit:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
  }

  /* MENSAJES */
  .msg {
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 20px;
    display: none;
  }

  .msg.error {
    background: var(--error-soft);
    color: var(--error);
    border: 1px solid rgba(192,57,43,0.2);
    display: block;
  }

  .msg.success {
    background: var(--green-soft);
    color: var(--green);
    border: 1px solid rgba(61,107,79,0.2);
    display: block;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 28px 0;
  }

  .toggle-text {
    text-align: center;
    font-size: 13px;
    color: var(--text-light);
  }

  .toggle-text a {
    color: var(--dark);
    font-weight: 600;
    text-decoration: none;
    cursor: pointer;
  }

  .toggle-text a:hover { text-decoration: underline; }

  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(250,247,242,0.3);
    border-top-color: var(--cream);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 480px) {
    nav { padding: 16px 24px; }
    .auth-card { padding: 36px 24px; }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">AI Auditor <span>Pro</span></a>
</nav>

<main>
  <div class="auth-card">
    <div class="auth-title" id="cardTitle">Bienvenido</div>
    <div class="auth-sub" id="cardSub">Accede a tu cuenta o crea una nueva.</div>

    <div class="tabs">
      <button class="tab active" id="tabLogin" onclick="showLogin()">Iniciar sesión</button>
      <button class="tab" id="tabRegister" onclick="showRegister()">Crear cuenta</button>
    </div>

    <div id="msgBox" class="msg"></div>

    <!-- LOGIN -->
    <div id="formLogin">
      <div class="form-group">
        <label>Correo electrónico</label>
        <input type="email" id="loginEmail" placeholder="tu@email.com">
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="loginPassword" placeholder="••••••••">
      </div>
      <button class="btn-submit" id="btnLogin" onclick="login()">Entrar →</button>
    </div>

    <!-- REGISTER -->
    <div id="formRegister" style="display:none">
      <div class="form-group">
        <label>Correo electrónico</label>
        <input type="email" id="regEmail" placeholder="tu@email.com">
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="regPassword" placeholder="Mínimo 6 caracteres">
      </div>
      <div class="form-group">
        <label>Repetir contraseña</label>
        <input type="password" id="regPassword2" placeholder="Repite tu contraseña">
      </div>
      <button class="btn-submit" id="btnRegister" onclick="register()">Crear cuenta →</button>
    </div>

    <div class="divider"></div>
    <div class="toggle-text" id="toggleText">
      ¿No tienes cuenta? <a onclick="showRegister()">Créala gratis</a>
    </div>
  </div>
</main>

<script>
  // ⚠️ SUSTITUYE ESTA URL POR TU URL DE APPS SCRIPT
  var BACKEND_URL = 'https://script.google.com/macros/s/AKfycbzhLnuKJIumOEx1KilS17WNpS6fQdLfUy_U50I5uYoDNRsx1XdJEQE7t7cIBz2SYvPNdg/exec';

  function showLogin() {
    document.getElementById('formLogin').style.display = 'block';
    document.getElementById('formRegister').style.display = 'none';
    document.getElementById('tabLogin').classList.add('active');
    document.getElementById('tabRegister').classList.remove('active');
    document.getElementById('cardTitle').textContent = 'Bienvenido';
    document.getElementById('cardSub').textContent = 'Accede a tu cuenta para continuar.';
    document.getElementById('toggleText').innerHTML = '¿No tienes cuenta? <a onclick="showRegister()">Créala gratis</a>';
    clearMsg();
  }

  function showRegister() {
    document.getElementById('formLogin').style.display = 'none';
    document.getElementById('formRegister').style.display = 'block';
    document.getElementById('tabRegister').classList.add('active');
    document.getElementById('tabLogin').classList.remove('active');
    document.getElementById('cardTitle').textContent = 'Crear cuenta';
    document.getElementById('cardSub').textContent = 'Empieza a ahorrar tiempo hoy mismo.';
    document.getElementById('toggleText').innerHTML = '¿Ya tienes cuenta? <a onclick="showLogin()">Inicia sesión</a>';
    clearMsg();
  }

  function showMsg(text, type) {
    var box = document.getElementById('msgBox');
    box.textContent = text;
    box.className = 'msg ' + type;
  }

  function clearMsg() {
    var box = document.getElementById('msgBox');
    box.className = 'msg';
    box.textContent = '';
  }

  function setLoading(btnId, loading) {
    var btn = document.getElementById(btnId);
    if (loading) {
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Cargando...';
    } else {
      btn.disabled = false;
      btn.innerHTML = btn.id === 'btnLogin' ? 'Entrar →' : 'Crear cuenta →';
    }
  }

  async function login() {
    var email = document.getElementById('loginEmail').value.trim();
    var pass = document.getElementById('loginPassword').value;

    if (!email || !pass) { showMsg('Por favor rellena todos los campos.', 'error'); return; }

    setLoading('btnLogin', true);
    clearMsg();

    try {
      var res = await fetch(BACKEND_URL + '?action=login&email=' + encodeURIComponent(email) + '&password=' + encodeURIComponent(pass));
      var data = await res.json();

      if (data.status === 'OK') {
        localStorage.setItem('aap_email', email);
        localStorage.setItem('aap_token', data.token);
        showMsg('¡Bienvenido! Redirigiendo...', 'success');
        setTimeout(function() { window.location.href = 'dashboard.html'; }, 1000);
      } else {
        showMsg(data.mensaje || 'Email o contraseña incorrectos.', 'error');
        setLoading('btnLogin', false);
      }
    } catch(e) {
      showMsg('Error de conexión. Inténtalo de nuevo.', 'error');
      setLoading('btnLogin', false);
    }
  }

  async function register() {
    var email = document.getElementById('regEmail').value.trim();
    var pass = document.getElementById('regPassword').value;
    var pass2 = document.getElementById('regPassword2').value;

    if (!email || !pass || !pass2) { showMsg('Por favor rellena todos los campos.', 'error'); return; }
    if (pass.length < 6) { showMsg('La contraseña debe tener al menos 6 caracteres.', 'error'); return; }
    if (pass !== pass2) { showMsg('Las contraseñas no coinciden.', 'error'); return; }

    setLoading('btnRegister', true);
    clearMsg();

    try {
      var res = await fetch(BACKEND_URL + '?action=register&email=' + encodeURIComponent(email) + '&password=' + encodeURIComponent(pass));
      var data = await res.json();

      if (data.status === 'OK') {
        localStorage.setItem('aap_email', email);
        localStorage.setItem('aap_token', data.token);
        showMsg('¡Cuenta creada! Redirigiendo...', 'success');
        setTimeout(function() { window.location.href = 'dashboard.html'; }, 1000);
      } else {
        showMsg(data.mensaje || 'Error al crear la cuenta.', 'error');
        setLoading('btnRegister', false);
      }
    } catch(e) {
      showMsg('Error de conexión. Inténtalo de nuevo.', 'error');
      setLoading('btnRegister', false);
    }
  }

  // Enter key
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      if (document.getElementById('formLogin').style.display !== 'none') login();
      else register();
    }
  });
</script>

</body>
</html>
